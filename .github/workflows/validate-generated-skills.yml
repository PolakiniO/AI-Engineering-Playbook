name: Validate Generated Skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-generated-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate Codex skill distribution
        run: python3 scripts/export-codex-skills.py

      - name: Fail if generated artifacts are stale
        run: git diff --exit-code -- dist/codex-skills
